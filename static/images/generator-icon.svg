<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#f0f9ff" stroke="#2563eb" stroke-width="3"/>
  
  <!-- Generator core -->
  <g>
    <!-- Generator main body -->
    <rect x="100" y="130" width="200" height="140" rx="20" ry="20" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
    
    <!-- Random noise input -->
    <path d="M 60,200 L 100,200" stroke="#2563eb" stroke-width="3" fill="none"/>
    <text x="30" y="192" font-family="Arial" font-size="14" fill="#2563eb" text-anchor="middle">z</text>
    <path d="M 30,200 Q 35,180 40,195 Q 45,210 50,185 Q 55,170 60,200" stroke="#2563eb" stroke-width="2" fill="none"/>
    
    <!-- Output -->
    <path d="M 300,200 L 340,200" stroke="#2563eb" stroke-width="3" fill="none"/>
    <polygon points="340,200 330,193 330,207" fill="#2563eb"/>
    
    <!-- Internal network layers -->
    <line x1="130" y1="160" x2="270" y2="160" stroke="#2563eb" stroke-width="2"/>
    <line x1="130" y1="200" x2="270" y2="200" stroke="#2563eb" stroke-width="2"/>
    <line x1="130" y1="240" x2="270" y2="240" stroke="#2563eb" stroke-width="2"/>
    
    <!-- Neural network nodes -->
    <circle cx="130" cy="160" r="5" fill="#2563eb"/>
    <circle cx="130" cy="200" r="5" fill="#2563eb"/>
    <circle cx="130" cy="240" r="5" fill="#2563eb"/>
    
    <circle cx="200" cy="160" r="5" fill="#2563eb"/>
    <circle cx="200" cy="200" r="5" fill="#2563eb"/>
    <circle cx="200" cy="240" r="5" fill="#2563eb"/>
    
    <circle cx="270" cy="160" r="5" fill="#2563eb"/>
    <circle cx="270" cy="200" r="5" fill="#2563eb"/>
    <circle cx="270" cy="240" r="5" fill="#2563eb"/>
    
    <!-- Connections between nodes -->
    <line x1="130" y1="160" x2="200" y2="160" stroke="#2563eb" stroke-width="1"/>
    <line x1="130" y1="160" x2="200" y2="200" stroke="#2563eb" stroke-width="1"/>
    <line x1="130" y1="160" x2="200" y2="240" stroke="#2563eb" stroke-width="1"/>
    
    <line x1="130" y1="200" x2="200" y2="160" stroke="#2563eb" stroke-width="1"/>
    <line x1="130" y1="200" x2="200" y2="200" stroke="#2563eb" stroke-width="1"/>
    <line x1="130" y1="200" x2="200" y2="240" stroke="#2563eb" stroke-width="1"/>
    
    <line x1="130" y1="240" x2="200" y2="160" stroke="#2563eb" stroke-width="1"/>
    <line x1="130" y1="240" x2="200" y2="200" stroke="#2563eb" stroke-width="1"/>
    <line x1="130" y1="240" x2="200" y2="240" stroke="#2563eb" stroke-width="1"/>
    
    <line x1="200" y1="160" x2="270" y2="160" stroke="#2563eb" stroke-width="1"/>
    <line x1="200" y1="160" x2="270" y2="200" stroke="#2563eb" stroke-width="1"/>
    <line x1="200" y1="160" x2="270" y2="240" stroke="#2563eb" stroke-width="1"/>
    
    <line x1="200" y1="200" x2="270" y2="160" stroke="#2563eb" stroke-width="1"/>
    <line x1="200" y1="200" x2="270" y2="200" stroke="#2563eb" stroke-width="1"/>
    <line x1="200" y1="200" x2="270" y2="240" stroke="#2563eb" stroke-width="1"/>
    
    <line x1="200" y1="240" x2="270" y2="160" stroke="#2563eb" stroke-width="1"/>
    <line x1="200" y1="240" x2="270" y2="200" stroke="#2563eb" stroke-width="1"/>
    <line x1="200" y1="240" x2="270" y2="240" stroke="#2563eb" stroke-width="1"/>
  </g>
  
  <!-- Generated images -->
  <g transform="translate(345, 180)">
    <!-- X-ray image representation -->
    <rect x="0" y="0" width="40" height="40" rx="3" ry="3" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="20" cy="20" r="12" fill="#e5e7eb" stroke="#2563eb" stroke-width="1"/>
    <circle cx="15" cy="15" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="320" font-family="Arial" font-size="18" font-weight="bold" fill="#2563eb" text-anchor="middle">Generator</text>
  
  <!-- Transformation effect -->
  <g opacity="0.7">
    <path d="M 310,190 Q 325,180 340,190" stroke="#2563eb" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
    <path d="M 310,210 Q 325,220 340,210" stroke="#2563eb" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Small lightbulb to indicate "creating" -->
  <g transform="translate(200, 105)">
    <path d="M 0,0 L 0,-15 Q 0,-25 10,-25 Q 20,-25 20,-15 L 20,0 Z" fill="#ffde03" stroke="#2563eb" stroke-width="2"/>
    <rect x="0" y="0" width="20" height="5" rx="2" ry="2" fill="#2563eb"/>
    <path d="M 10,-25 Q 15,-32 10,-35 Q 5,-38 10,-40" stroke="#ffde03" stroke-width="2" fill="none"/>
  </g>
</svg>
